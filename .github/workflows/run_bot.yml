name: Core Automation Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  execute-task:
    runs-on: ubuntu-22.04

    steps:
    - name: Retrieve Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Core Dependencies Directly
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==68.2.2 wheel
        pip install playwright==1.49.0 playwright-stealth==1.0.6 google-generativeai==0.8.3 Pillow==10.4.0
        playwright install chromium --with-deps

    - name: Execute Core Logic
      env:
        PRIVATE_KEY_1: ${{ secrets.PRIVATE_KEY_1 }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python bot.py
